<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>STG-BSM™ OS v2.0 · Soberania Territorial · Jadiel Freitas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#080A0E;--s1:#0D0F14;--s2:#111520;--s3:#161B26;--s4:#1E2433;--s5:#252D3D;
  --border:#252836;--text:#F0EFE8;--t1:#C8CAD5;--t2:#8A8E9E;--t3:#555870;
  --gold:#C8A84B;--glt:#E4C97A;--gdim:#5A4820;--gdk:#1A1200;--grd:rgba(200,168,75,.07);
  --grn:#22A060;--gbg:rgba(34,160,96,.07);
  --red:#C0392B;--rlt:#E04838;--rbg:rgba(192,57,43,.08);
  --amb:#C07820;--alt:#E8A030;--abg:rgba(192,120,32,.07);
  --blu:#1A5C9A;--blt:#4A90D0;--bbg:rgba(26,92,154,.09);
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
  --r:7px;--rl:11px;--sb:248px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);
  font-size:13px;line-height:1.55;min-height:100dvh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:4px;}
button,input,select,textarea{font-family:var(--font);outline:none;-webkit-appearance:none;}
textarea{resize:vertical;}
input[type=range]{accent-color:var(--gold);cursor:pointer;width:100%;}

/* LAYOUT */
.app{display:flex;min-height:100dvh;}
.sidebar{width:var(--sb);background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;overflow-y:auto;flex-shrink:0;}
.main-area{flex:1;overflow-y:auto;}
.page-wrap{padding:24px 28px 60px;}
@media(max-width:768px){
  .sidebar{display:none;}
  .page-wrap{padding:14px 14px 80px;}
  .mobile-nav{display:flex!important;}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--s1);border-top:1px solid var(--border);
  align-items:center;justify-content:space-around;padding:8px 4px 14px;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
  padding:4px 10px;border-radius:var(--r);color:var(--t2);font-size:9px;transition:all .15s;}
.mn-btn.act{color:var(--gold);}
.mn-ico{font-size:18px;}

/* SIDEBAR */
.sb-logo{padding:18px 16px 13px;border-bottom:1px solid var(--border);}
.sb-brand{font-size:20px;font-weight:800;color:var(--gold);letter-spacing:2.5px;font-family:var(--mono);}
.sb-sub{font-size:8px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.sb-eq{font-size:8px;color:var(--gdim);font-family:var(--mono);margin-top:5px;}
.sb-sec{padding:11px 13px 3px;font-size:8px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;
  border-radius:var(--r);margin:1px 6px;color:var(--t2);font-size:12px;font-weight:500;
  transition:all .15s;position:relative;user-select:none;}
.nav-item:hover{background:var(--s3);color:var(--text);}
.nav-item.active{background:var(--grd);color:var(--gold);border:1px solid var(--gdim);}
.nav-item.active::before{content:'';position:absolute;left:0;top:22%;height:56%;
  width:2px;background:var(--gold);border-radius:0 2px 2px 0;}
.nav-icon{width:15px;text-align:center;font-size:13px;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:10px;font-family:var(--mono);}
.nb-r{background:var(--rbg);color:var(--rlt);}
.nb-g{background:var(--gbg);color:var(--grn);}
.nb-a{background:var(--abg);color:var(--alt);}

/* SIDEBAR BOTTOM */
.sb-bottom{margin-top:auto;padding:13px 12px;border-top:1px solid var(--border);}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;}
.kpi-sm{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:6px;text-align:center;}
.kpi-sm .v{font-family:var(--mono);font-size:14px;font-weight:700;}
.kpi-sm .l{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.result-box{background:var(--gdk);border:1px solid var(--gdim);border-radius:var(--r);padding:9px;text-align:center;}
.result-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold);}
.result-lbl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}

/* PAGE HEADER */
.ph{margin-bottom:20px;}
.ph-bc{font-size:9px;color:var(--t3);font-family:var(--mono);margin-bottom:5px;}
.ph-title{font-size:22px;font-weight:700;color:var(--text);}
.ph-sub{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5;}

/* PAGE animation */
.page{display:none;}
.page.active{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cs2{grid-column:span 2;}
@media(max-width:960px){.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr;}.cs2{grid-column:span 1;}}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);padding:17px;margin-bottom:13px;}
.card-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);
  margin-bottom:11px;font-family:var(--mono);display:flex;align-items:center;gap:7px;}
.card-title::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:2px;flex-shrink:0;}

/* KPI CARDS */
.kc{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);
  padding:13px 15px;position:relative;overflow:hidden;}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.kc.g::after{background:var(--grn);}.kc.r::after{background:var(--rlt);}
.kc.a::after{background:var(--alt);}.kc.b::after{background:var(--blt);}
.kl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:4px;font-family:var(--mono);}
.kv{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1;}
.kv.gold{color:var(--gold);}.kv.grn{color:var(--grn);}
.kv.red{color:var(--rlt);}.kv.amb{color:var(--alt);}
.ks{font-size:9px;color:var(--t2);margin-top:3px;}
.kd{font-size:10px;font-family:var(--mono);margin-top:2px;}
.du{color:var(--grn);}.dd{color:var(--rlt);}

/* FORMS */
.fg{margin-bottom:11px;}
.lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);
  margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.lv{font-family:var(--mono);color:var(--gold);font-size:11px;}
.inp{width:100%;background:var(--s3);border:1.5px solid var(--border);border-radius:var(--r);
  padding:9px 12px;color:var(--text);font-size:12px;transition:border-color .15s,background .15s;}
.inp:focus{border-color:var(--gold);background:var(--s2);}
.inp::placeholder{color:var(--t3);}
select.inp option{background:var(--s1);}
textarea.inp{min-height:68px;line-height:1.6;}

/* BUTTONS */
.btn{padding:8px 17px;border-radius:var(--r);border:none;cursor:pointer;
  font-size:11px;font-family:var(--mono);letter-spacing:.5px;font-weight:600;transition:all .15s;}
.btn-g{background:var(--gold);color:var(--bg);}
.btn-g:hover{background:var(--glt);}
.btn-gh{background:transparent;color:var(--t2);border:1.5px solid var(--border);}
.btn-gh:hover{color:var(--text);border-color:var(--t2);}
.btn-r{background:var(--rbg);color:var(--rlt);border:1px solid var(--red);}
.btn-sm{padding:5px 11px;font-size:10px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* TABLES */
.dt{width:100%;border-collapse:collapse;font-size:11px;}
.dt th{background:var(--s1);color:var(--gold);font-size:8px;letter-spacing:1px;
  text-transform:uppercase;padding:8px 10px;text-align:left;font-family:var(--mono);
  border-bottom:1px solid var(--gdim);}
.dt td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--t1);vertical-align:middle;}
.dt tr:hover td{background:rgba(200,168,75,.03);}
.dt tr:nth-child(even) td{background:rgba(255,255,255,.015);}

/* BADGES */
.badge{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:20px;font-weight:600;}
.bg{background:rgba(34,160,96,.15);color:var(--grn);border:1px solid rgba(34,160,96,.3);}
.br{background:var(--rbg);color:var(--rlt);border:1px solid rgba(192,57,43,.3);}
.ba{background:var(--abg);color:var(--alt);border:1px solid rgba(192,120,32,.3);}
.bo{background:var(--grd);color:var(--gold);border:1px solid var(--gdim);}
.bb{background:var(--bbg);color:var(--blt);border:1px solid rgba(26,92,154,.3);}

/* CALLOUTS */
.co{border:1px solid var(--gdim);border-left:3px solid var(--gold);background:var(--grd);
  padding:10px 14px;border-radius:0 var(--r) var(--r) 0;margin-bottom:10px;
  font-size:11px;color:var(--t1);line-height:1.65;}
.co strong{color:var(--text);}
.co.ok{border-left-color:var(--grn);border-color:rgba(34,160,96,.22);background:var(--gbg);}
.co.warn{border-left-color:var(--alt);border-color:rgba(192,120,32,.22);background:var(--abg);}
.co.err{border-left-color:var(--rlt);border-color:rgba(192,57,43,.22);background:var(--rbg);}
.co.info{border-left-color:var(--blt);border-color:rgba(26,92,154,.22);background:var(--bbg);}

/* PROGRESS */
.pbar{margin-bottom:8px;}
.pbrow{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);margin-bottom:3px;font-family:var(--mono);}
.ptrack{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s ease;}
.pfill.g{background:var(--grn);}.pfill.r{background:var(--rlt);}.pfill.a{background:var(--alt);}

/* FORMULA BOX */
.fbox{background:var(--s1);border:1px solid var(--gdim);border-radius:var(--r);
  padding:12px 16px;text-align:center;margin:8px 0;}
.fbox .f{font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:700;}
.fbox .fs{font-size:8px;color:var(--t2);margin-top:4px;}

/* INFLUENCE GRID */
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
@media(max-width:650px){.ig{grid-template-columns:repeat(2,1fr);}}
.ic{border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .18s;user-select:none;}
.ic:hover{border-color:var(--t2);}
.ic.act{border-color:var(--rlt);background:var(--rbg);}
.ic.par{border-color:var(--alt);background:var(--abg);}
.ic.rem{border-color:var(--grn);background:var(--gbg);}
.ic.gt{box-shadow:0 0 14px rgba(200,168,75,.4);border-color:var(--gold)!important;}
.ic-code{font-size:8px;font-family:var(--mono);color:var(--t3);margin-bottom:3px;}
.ic-name{font-size:10px;color:var(--text);font-weight:600;margin-bottom:4px;line-height:1.3;}
.ic-stat{font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:20px;display:inline-block;}
.ic.act .ic-stat{background:var(--rbg);color:var(--rlt);}
.ic.par .ic-stat{background:var(--abg);color:var(--alt);}
.ic.rem .ic-stat{background:var(--gbg);color:var(--grn);}
.ic-cks{margin-top:6px;display:flex;gap:4px;}
.ick{width:10px;height:10px;border-radius:50%;background:var(--s4);border:1px solid var(--border);cursor:pointer;transition:all .18s;}
.ick.on{background:var(--gold);border-color:var(--gold);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);
  width:100%;max-width:700px;max-height:92dvh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.55);}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;
  padding:17px 20px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--s2);z-index:1;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--s4);
  color:var(--t2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.mtabs{display:flex;gap:3px;padding:4px;background:var(--s3);border-radius:var(--r);margin-bottom:16px;}
.mtab{flex:1;padding:6px;text-align:center;cursor:pointer;border-radius:6px;
  font-size:10px;font-weight:600;color:var(--t2);transition:all .15s;}
.mtab.act{background:var(--gold);color:var(--bg);}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
@media(max-width:860px){.kanban{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.kanban{grid-template-columns:1fr;}}
.kb-col{background:var(--s2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;min-height:300px;}
.kb-hdr{padding:11px 13px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;border-bottom:1px solid var(--border);}
.hdr-neb{background:rgba(192,57,43,.1);color:var(--rlt);}
.hdr-tra{background:rgba(192,120,32,.1);color:var(--alt);}
.hdr-evt{background:rgba(26,92,154,.1);color:var(--blt);}
.hdr-cor{background:rgba(34,160,96,.1);color:var(--grn);}
.kb-body{padding:9px;display:flex;flex-direction:column;gap:8px;}
.kb-card{background:var(--s3);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 12px;cursor:pointer;transition:all .18s;}
.kb-card:hover{border-color:var(--t2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.3);}
.kb-card.stag{border-style:dashed;border-color:var(--rlt);opacity:.55;}
.kbn{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
.kbv{font-size:10px;color:var(--gold);font-family:var(--mono);}
.kbg{font-size:9px;color:var(--t2);margin-top:4px;font-family:var(--mono);}
.kbs{font-size:8px;color:var(--rlt);font-family:var(--mono);margin-top:2px;}

/* SPACETIME */
.st-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.st-grid{grid-template-columns:1fr;}}
.stc{border-radius:var(--rl);padding:17px;border:1px solid;}
.stc.n{background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.28);}
.stc.e{background:rgba(192,120,32,.06);border-color:rgba(192,120,32,.28);}
.stc.c{background:rgba(34,160,96,.06);border-color:rgba(34,160,96,.28);}
.stc-lbl{font-size:8px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px;}
.stc.n .stc-lbl{color:var(--rlt);}.stc.e .stc-lbl{color:var(--alt);}.stc.c .stc-lbl{color:var(--grn);}
.stc-num{font-size:34px;font-weight:700;font-family:var(--mono);}
.stc.n .stc-num{color:var(--rlt);}.stc.e .stc-num{color:var(--alt);}.stc.c .stc-num{color:var(--grn);}
.stc-sub{font-size:9px;color:var(--t2);margin-top:3px;}

/* GAUGE */
.gauge-c{display:flex;flex-direction:column;align-items:center;}

/* TRUTH */
.ts{padding:3px 9px;border-radius:20px;font-size:9px;font-family:var(--mono);font-weight:700;}
.ts-real{background:rgba(34,160,96,.18);color:var(--grn);border:1px solid rgba(34,160,96,.35);}
.ts-opt{background:rgba(192,120,32,.18);color:var(--alt);border:1px solid rgba(192,120,32,.35);}
.ts-fan{background:rgba(192,57,43,.18);color:var(--rlt);border:1px solid rgba(192,57,43,.35);}

/* TES ITEMS */
.tes-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.tes-cb{width:17px;height:17px;border-radius:4px;border:1px solid var(--border);background:var(--s3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.tes-cb.on{background:var(--gold);border-color:var(--gold);}
.tes-txt{flex:1;font-size:11px;color:var(--t1);}
.tes-w{font-size:9px;font-family:var(--mono);color:var(--t3);}

/* AI FLOAT */
.ai-float{position:fixed;bottom:24px;right:24px;z-index:500;}
@media(max-width:768px){.ai-float{bottom:80px;right:14px;}}
.ai-btn{width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),#5A4820);
  border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(200,168,75,.35);transition:all .2s;}
.ai-btn:hover{transform:scale(1.08);}
.ai-panel{position:absolute;bottom:62px;right:0;width:305px;
  background:var(--s2);border:1px solid var(--gdim);border-radius:var(--rl);
  box-shadow:0 16px 48px rgba(0,0,0,.55);overflow:hidden;}
.ai-hdr{padding:13px 15px;background:rgba(200,168,75,.07);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ai-title{font-size:12px;font-weight:700;color:var(--gold);}
.ai-body{padding:12px;max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
.ai-item{background:var(--s3);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:10px;color:var(--t1);line-height:1.5;}
.ai-item.crit{border-left:3px solid var(--rlt);}
.ai-item.warn{border-left:3px solid var(--alt);}
.ai-item.ok{border-left:3px solid var(--grn);}
.ai-tag{font-size:8px;font-family:var(--mono);color:var(--gold);margin-bottom:3px;letter-spacing:.5px;}
.ai-notif{position:absolute;top:-3px;right:-3px;width:17px;height:17px;background:var(--rlt);
  border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;}

/* NERVAL ALERTS */
.nal{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:var(--r);
  margin-bottom:7px;font-size:11px;border:1px solid;}
.nal.crit{background:var(--rbg);border-color:var(--red);color:var(--rlt);}
.nal.warn{background:var(--abg);border-color:var(--amb);color:var(--alt);}
.nal.ok2{background:var(--gbg);border-color:var(--grn);color:var(--grn);}
.nal.info{background:var(--bbg);border-color:var(--blu);color:var(--blt);}
.nal-ico{font-size:15px;flex-shrink:0;}
.nal-b{flex:1;}.nal-t{font-weight:700;font-size:8px;font-family:var(--mono);letter-spacing:.5px;margin-bottom:2px;}

/* LOOP */
.loop-item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.loop-num{width:25px;height:25px;border-radius:50%;background:var(--gdim);border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:var(--gold);flex-shrink:0;}
.loop-num.done{background:rgba(34,160,96,.18);border-color:var(--grn);color:var(--grn);}

/* ══ BSM™ MATH ENGINE ════════════════════════════════════════════════ */
const BSM = {
  /* IDT™ = share×0.35 + presença×0.25 + referência×0.25 + barreiras×0.15 */
  calcIDT(share=0, presenca=0, referencia=0, barreiras=0) {
    return Math.round(share*0.35 + presenca*0.25 + referencia*0.25 + (barreiras/5*100)*0.15);
  },
  /* GRAVIT-Meter™ = (removidas + parciais×0.5) / 12 */
  calcGravit(infs=[]) {
    const rem = infs.filter(x=>x.status==='REMOVIDA').length;
    const par = infs.filter(x=>x.status==='PARCIAL').length;
    return Math.min(1, +(rem + par*0.5).toFixed(4) / 12);
  },
  /* TES™ = soma ponderada */
  calcTES(checks=[]) {
    return checks.reduce((s,c)=>s+(c.done?c.weight:0), 0);
  },
  /* Resultado BSM™ */
  calcResult(idt=0, gravit=0, tes=0) {
    return +((idt/100) * gravit * (tes/100)).toFixed(4);
  },
  /* AIE™ Monte Carlo — 2000 iter. distribuição triangular */
  calcAIE(gravit=0, tes=0, days=0, winRate=0.65) {
    const N=2000; let wins=0;
    const g = Math.max(0, gravit - (days>30?0.15:0));
    const t = tes/100;
    for(let i=0;i<N;i++){
      const r1=Math.random(),r2=Math.random(),r3=Math.random();
      const gSim = g*0.5 + (r1+r2)/2*0.3 + r3*0.2;
      const score = gSim * t * winRate * (1+(Math.random()-.5)*.2);
      if(score>0.5) wins++;
    }
    return Math.min(99,Math.max(1,Math.round(wins/N*100)));
  },
  /* Influência Gatilho */
  findGatilho(infs=[]) {
    const CASC={B1:['B2'],B2:['B1','B3'],B3:['B1','M1'],B4:['B2','B3'],
      S1:['S2','S4'],S2:['S3'],S3:['M3','S2'],S4:['S1','B2'],
      M1:['M2'],M2:['M3'],M3:['M4'],M4:['M3','S2']};
    const ativas = infs.filter(x=>x.status!=='REMOVIDA').map(x=>x.codigo);
    let best=null,bs=-1;
    ativas.forEach(c=>{
      const sc=(CASC[c]||[]).filter(x=>ativas.includes(x)).length;
      if(sc>bs){bs=sc;best=c;}
    });
    return best;
  },
  gravPhase(g) { return g<.33?'NEBULA':g<.67?'TRAÇÃO':g<.92?'EVENT HORIZON':'THE CORE'; },
  truthScore(gravit,aie,days) {
    if(aie>70&&gravit<.4) return 'FANTASIA';
    if(days>60) return 'FANTASIA';
    if(aie>60&&gravit>.5) return 'REAL';
    return 'OTIMISTA';
  },
  applyDeg(aie,days) { return days>30?Math.max(1,Math.round(aie*.85)):aie; },
  idtStatus(v) { return v>=80?{l:'SOBERANO',c:'bg'}:v>=60?{l:'CONSOLIDADO',c:'bg'}:v>=30?{l:'REFERÊNCIA',c:'ba'}:{l:'ESTRANHO',c:'br'}; },
};

/* ══ AI ENGINE ══════════════════════════════════════════════════════ */
function buildInsights(accounts) {
  const res = [];
  accounts.forEach(acc => {
    const g   = BSM.calcGravit(acc.influences||[]);
    const aie = BSM.applyDeg(acc.aie||0, acc.dia_ult||0);
    const days= acc.dia_ult||0;
    const gt  = BSM.findGatilho(acc.influences||[]);
    const gtDef = INFL_DEFS.find(d=>d.codigo===gt);

    if((acc.stage==='THE CORE'||acc.stage==='EVENT HORIZON') && aie>=85)
      res.push({type:'ok',conta:acc.nome,msg:`AIE™ ${aie}% — Convergência confirmada. Proposta formal hoje.`,p:1});
    if(days>30 && aie>50)
      res.push({type:'crit',conta:acc.nome,msg:`Estagnada ${days} dias. Degradação −15% aplicada. Urgência máxima.`,p:2});
    if(gt && gtDef)
      res.push({type:'warn',conta:acc.nome,msg:`Gatilho ${gt} — ${gtDef.nome}. Remove → colapsa ${(gtDef.cascata||[]).join('+')}. Ataque agora.`,p:3});
    if(g<.4 && aie>65)
      res.push({type:'crit',conta:acc.nome,msg:`ILUSÃO COMERCIAL: AIE™ ${aie}% mas GRAVIT™ ${(g*100).toFixed(0)}%. Pipeline inflado.`,p:1});
  });
  return res.sort((a,b)=>a.p-b.p).slice(0,6);
}

function globalMetrics() {
  const accs = S.accounts;
  const nebula  = accs.filter(a=>a.stage==='NEBULA').length;
  const tracao  = accs.filter(a=>a.stage==='TRAÇÃO').length;
  const horizon = accs.filter(a=>a.stage==='EVENT HORIZON').length;
  const core    = accs.filter(a=>a.stage==='THE CORE').length;
  const avgG  = accs.reduce((s,a)=>s+BSM.calcGravit(a.influences||[]),0)/Math.max(1,accs.length);
  const avgT  = accs.reduce((s,a)=>s+BSM.calcTES(a.tes_checks||[]),0)/Math.max(1,accs.length);
  const avgIDT= S.clusters.reduce((s,c)=>s+c.idt,0)/Math.max(1,S.clusters.length);
  const res   = BSM.calcResult(avgIDT,avgG,avgT);
  const vplT  = accs.reduce((s,a)=>s+(a.vpl||0),0);
  const vplW  = accs.reduce((s,a)=>s+(a.vpl||0)*(a.aie||50)/100,0);
  return {nebula,tracao,horizon,core,avgG,avgT:Math.round(avgT),avgIDT:Math.round(avgIDT),res,vplT,vplW};
}

    if(el&&vEl){ el.addEventListener('input',()=>{ vEl.textContent=parseFloat(el.value).toFixed(2); calcAIE(); }); }
  });
  calcAIE();
}
function initIDTCalc() {
  ['idt-s','idt-p','idt-r','idt-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',updIDT);
  });
  updIDT();
}

function accField(k,v) { if(S.selAcc) render({selAcc:{...S.selAcc,[k]:v}}); }
function cycleInfl(accId,code) {
  const a=S.selAcc||S.accounts.find(x=>x.id===accId);
  if(!a) return;
  const infs=[...(a.influences||mkInfls())];
  const idx=infs.findIndex(x=>x.codigo===code);
  if(idx<0) return;
  const s=infs[idx].status;
  infs[idx]={...infs[idx],status:s==='ATIVA'?'PARCIAL':s==='PARCIAL'?'REMOVIDA':'ATIVA',
    checks:s==='PARCIAL'?[true,true,true]:s==='REMOVIDA'?[false,false,false]:infs[idx].checks};
  if(S.selAcc) render({selAcc:{...S.selAcc,influences:infs}});
  else { S.accounts=S.accounts.map(x=>x.id===accId?{...x,influences:infs}:x); render({}); }
}
function toggleCheck(accId,code,ci) {
  const a=S.selAcc||S.accounts.find(x=>x.id===accId);
  if(!a) return;
  const infs=[...(a.influences||mkInfls())];
  const idx=infs.findIndex(x=>x.codigo===code);
  if(idx<0) return;
  const cks=[...(infs[idx].checks||[false,false,false])];
  cks[ci]=!cks[ci];
  const sum=cks.filter(Boolean).length;
  infs[idx]={...infs[idx],checks:cks,status:sum===0?'ATIVA':sum===3?'REMOVIDA':'PARCIAL'};
  if(S.selAcc) render({selAcc:{...S.selAcc,influences:infs}});
  else { S.accounts=S.accounts.map(x=>x.id===accId?{...x,influences:infs}:x); render({}); }
}
function toggleTES(accId,idx) {
  const a=S.selAcc||S.accounts.find(x=>x.id===accId);
  if(!a) return;
  const tc=[...(a.tes_checks||mkTES())];
  tc[idx]={...tc[idx],done:!tc[idx].done};
  if(S.selAcc) render({selAcc:{...S.selAcc,tes_checks:tc}});
  else { S.accounts=S.accounts.map(x=>x.id===accId?{...x,tes_checks:tc}:x); render({}); }
}

/* ── IDT Calculator ──────────────────────────────────────────────── */
function updIDT() {
  const sh=+(document.getElementById('idt-s')?.value||35);
  const pr=+(document.getElementById('idt-p')?.value||60);
  const rf=+(document.getElementById('idt-r')?.value||70);
  const mf=+(document.getElementById('idt-m')?.value||3);
  if(document.getElementById('idt-sv')) document.getElementById('idt-sv').textContent=sh+'%';
  if(document.getElementById('idt-pv')) document.getElementById('idt-pv').textContent=pr+'%';
  if(document.getElementById('idt-rv')) document.getElementById('idt-rv').textContent=rf+'%';
  if(document.getElementById('idt-mv')) document.getElementById('idt-mv').textContent=mf;
  const idt=BSM.calcIDT(sh,pr,rf,mf);
  const res=document.getElementById('idt-result');
  if(res) {
    const s=BSM.idtStatus(idt);
    res.innerHTML=`<div class="fbox"><div class="f">IDT™ = ${idt}</div>
      <div class="fs">${s.l} — ${idt>=80?'Extrair + Flywheel':idt>=60?'Consolidar antes de expandir':idt>=30?'Reforçar âncora':'Diagnóstico Territorial Blindness™'}</div></div>`;
  }
}

/* ── AIE Calculator ──────────────────────────────────────────────── */
function calcAIE() {
  const get=id=>+(document.getElementById(id)?.value||0);
  const idt=get('a0'),ve=get('a1'),phi=get('a2'),e1=get('a3'),e2=get('a4'),e3=get('a5'),k=get('a6');
  for(let i=0;i<7;i++){
    const v=get('a'+i);
    const el=document.getElementById('av'+i);
    if(el) el.textContent=v.toFixed(2);
  }
  const aie=Math.max(0,Math.min(1,((idt*ve*phi)-(e1+e2+e3))*k));
  const pct=Math.round(aie*100);
  const res=document.getElementById('aie-result');
  const act=document.getElementById('aie-action');
  if(res) res.innerHTML=`<div style="font-family:var(--mono);font-size:52px;font-weight:700;color:${pct>=70?'var(--grn)':pct>=40?'var(--alt)':'var(--rlt)'}">${aie.toFixed(3)}</div>
    <div style="font-size:12px;font-weight:700;color:${pct>=85?'var(--grn)':pct>=50?'var(--alt)':'var(--rlt)'}">${pct>=85?'CONVERGÊNCIA CONFIRMADA':pct>=50?'CAMPO EM CONSTRUÇÃO':'STOP-LOSS RECOMENDADO'}</div>
    <div style="font-size:9px;color:var(--t2);margin-top:3px">Monte Carlo 2.000 iterações</div>`;
  if(act){
    act.className='co '+(pct>=85?'ok':pct>=50?'warn':'err');
    act.innerHTML=`<strong>AÇÃO:</strong> ${pct>=85?'Fechar agora. Proposta formal em 24h. SNIPER™ ativado.':pct>=50?'Continuar removendo influências. Verificar Influência Gatilho.':'Stop-Loss. Remap do cluster. Nova âncora.'}`;
  }
  const bar=document.querySelector('.pfill.g');
  if(bar) bar.style.width=pct+'%';
}

async function doLogin() {
  const email=document.getElementById('li-email')?.value;
  const pass =document.getElementById('li-pass')?.value;
  const errEl=document.getElementById('login-err');
  if(!email||!pass){ if(errEl) errEl.innerHTML='<div class="co err">Preencha email e senha.</div>'; return; }
  const btn2=document.getElementById('li-btn-txt');
  if(btn2) btn2.textContent='...';
  try{
    const fn=_loginMode==='login'?sb.auth.signInWithPassword.bind(sb.auth):sb.auth.signUp.bind(sb.auth);
    const {data,error}=await fn({email,password:pass});
    if(error) throw error;
    if(data?.user) render({user:data.user});
    else if(errEl) errEl.innerHTML='<div class="co warn">Verifique seu email para confirmar o cadastro.</div>';
  }catch(e){
    if(errEl) errEl.innerHTML=`<div class="co err">${e.message||'Erro de autenticação. Use o modo Demo.'}</div>`;
    if(btn2) btn2.textContent=_loginMode==='login'?'ENTRAR →':'CRIAR CONTA →';
  }
}
