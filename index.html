<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STG-BSM™ OS | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono&display=swap');
        
        :root { --bg: #020617; --card: #0f172a; --accent: #10b981; --border: rgba(255,255,255,0.1); }
        
        body, html { 
            height: 100%; margin: 0; background: var(--bg); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        .app-container { display: none; height: 100vh; flex-direction: column; }
        .active-app { display: flex !important; }

        /* Componentes de UI */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; width: 100%; transition: 0.2s; }
        .input-field:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
        
        .btn-bsm { background: var(--accent); color: #020617; font-weight: 800; padding: 14px; border-radius: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s; text-align: center; border: none; }
        .btn-bsm:active { transform: scale(0.97); }

        /* Scroll Customizado */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Radar Fix */
        .vector-path { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .vector-path:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center">
        <div class="text-center">
            <div class="text-4xl font-black tracking-tighter animate-pulse">BSM<span class="text-emerald-500">™</span></div>
            <div class="text-[10px] text-slate-500 mt-2 font-mono uppercase tracking-[0.5em]">System Booting...</div>
        </div>
    </div>

    <div id="auth-view" class="h-screen w-full flex items-center justify-center bg-[radial-gradient(circle_at_top,_#1e293b_0%,_#020617_100%)] p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black">LOGIN</h1>
                <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Acesse o Terminal Estratégico</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" class="input-field" placeholder="E-mail Corporativo" required>
                <input type="password" id="password" class="input-field" placeholder="Senha" required>
                
                <div id="register-only" class="hidden space-y-4">
                    <select id="role-select" class="input-field">
                        <option value="S">Sales (Nível S1)</option>
                        <option value="M">Manager (Nível M2)</option>
                        <option value="B" selected>Business (Nível B3)</option>
                    </select>
                </div>

                <div id="auth-error" class="hidden text-[10px] font-bold text-rose-500 text-center uppercase p-2 border border-rose-500/20 bg-rose-500/5 rounded-lg"></div>

                <button type="submit" id="btn-submit" class="w-full btn-bsm">Acessar BSM</button>

                <div class="flex justify-between items-center px-2">
                    <button type="button" onclick="toggleAuthMode()" id="toggle-mode" class="text-[10px] text-slate-500 hover:text-white uppercase font-bold">Criar nova conta</button>
                    <button type="button" onclick="recoverPass()" class="text-[10px] text-slate-500 hover:text-white uppercase font-bold">Recuperar senha</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-view" class="app-container">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 shrink-0 bg-slate-950/50">
            <div class="flex items-center gap-4">
                <span class="text-xl font-black tracking-tighter">STG-BSM<span class="text-emerald-500">™</span></span>
                <div id="status-badge" class="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/30 text-emerald-500 text-[9px] font-black rounded uppercase">Online</div>
            </div>
            <button onclick="logout()" class="text-slate-500 hover:text-rose-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            
            <aside class="w-full md:w-80 border-r border-white/5 flex flex-col bg-slate-950/20">
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Territórios</h3>
                    <button onclick="openAccModal()" class="w-6 h-6 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-black">+</button>
                </div>
                <div id="acc-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
                    </div>
            </aside>

            <main class="flex-1 flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_#0f172a_0%,_#020617_100%)]">
                <div id="ia-box" class="mb-8 glass p-4 rounded-2xl w-full max-w-lg border-emerald-500/20">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                        <span class="text-[9px] font-black uppercase text-emerald-500 tracking-tighter">Insight de Soberania</span>
                    </div>
                    <p id="insight-text" class="text-xs text-slate-300 font-medium italic">Selecione um território para análise estrutural.</p>
                </div>

                <div class="relative w-full max-w-[420px] aspect-square">
                    <svg id="radar-svg" viewBox="0 0 500 500" class="w-full h-full"></svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center">
                        <div id="gravit-val" class="text-6xl font-black leading-none">0%</div>
                        <div class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mt-2">Gravit™ Force</div>
                    </div>
                </div>
            </main>

            <aside class="w-full md:w-96 border-l border-white/5 flex flex-col bg-slate-950/20">
                <div class="p-4 border-b border-white/5">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Plano de Execução</h3>
                </div>
                <div id="action-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll">
                    </div>
                <div class="p-4 border-t border-white/5 bg-black/40">
                    <div class="flex gap-2">
                        <input type="text" id="action-input" class="input-field text-xs" placeholder="Nova ação tática...">
                        <button onclick="addAction()" class="btn-bsm px-4 py-2 text-xs">OK</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="acc-modal" class="fixed inset-0 z-[1000] hidden bg-black/90 flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem]">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Novo Território</h2>
            <div class="space-y-4">
                <input type="text" id="acc-name" class="input-field" placeholder="Nome do Cliente/Conta">
                <input type="number" id="acc-valor" class="input-field" placeholder="Valor Estimado (TES)">
                <div class="flex gap-2">
                    <button onclick="closeAccModal()" class="flex-1 py-3 bg-white/5 rounded-xl font-bold text-xs">CANCELAR</button>
                    <button onclick="saveAccount()" class="flex-1 btn-bsm">CRIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PROTOCOLO DE CONEXÃO SUPABASE
        const SUPA_URL = 'https://jwpncdkrzjlieuaaqyto.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3cG5jZGtyempsaWV1YWFxeXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjUyNTcsImV4cCI6MjA5MDMwMTI1N30.OkyVSFHGL7IHMtE6Y2V7KLFgdkfAyT-YHXBCh_vq9Pw';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        // STATE MANAGEMENT
        let G = {
            user: null,
            role: 'B',
            mode: 'login',
            accounts: [],
            activeId: null,
            influences: []
        };

        const VECTORS = [
            'B1','B2','B3','B4','S1','S2','S3','S4','M1','M2','M3','M4'
        ];

        // ENGINE DE AUTENTICAÇÃO
        function toggleAuthMode() {
            G.mode = G.mode === 'login' ? 'signup' : 'login';
            document.getElementById('register-only').classList.toggle('hidden', G.mode === 'login');
            document.getElementById('toggle-mode').innerText = G.mode === 'login' ? 'Criar nova conta' : 'Já tenho conta';
            document.getElementById('btn-submit').innerText = G.mode === 'login' ? 'Acessar BSM' : 'Registrar BSM';
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errBox = document.getElementById('auth-error');
            const btn = document.getElementById('btn-submit');

            errBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = "SINCRO...";

            try {
                if(G.mode === 'signup') {
                    const role = document.getElementById('role-select').value;
                    const { error } = await sb.auth.signUp({ 
                        email, password, options: { data: { role } } 
                    });
                    if(error) throw error;
                    alert("Verifique seu email para confirmar.");
                } else {
                    const { data, error } = await sb.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    location.reload();
                }
            } catch (err) {
                errBox.innerText = err.message;
                errBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = G.mode === 'login' ? 'Acessar BSM' : 'Registrar BSM';
            }
        };

        async function recoverPass() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Digite o email.");
            await sb.auth.resetPasswordForEmail(email);
            alert("Email enviado.");
        }

        // ENGINE OPERACIONAL (CRUD)
        async function loadAccounts() {
            const { data } = await sb.from('accounts').select('*').order('created_at', {ascending: false});
            G.accounts = data || [];
            renderAccounts();
        }

        function renderAccounts() {
            const list = document.getElementById('acc-list');
            list.innerHTML = G.accounts.map(acc => `
                <div onclick="selectAccount('${acc.id}')" class="p-4 glass rounded-2xl cursor-pointer hover:border-emerald-500/50 transition-all ${G.activeId === acc.id ? 'border-emerald-500 bg-emerald-500/10' : ''}">
                    <div class="text-[11px] font-black uppercase text-white truncate">${acc.name}</div>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[9px] mono text-slate-500">TES: R$ ${Number(acc.valor).toLocaleString()}</span>
                        <button onclick="deleteAccount(event, '${acc.id}')" class="text-slate-600 hover:text-rose-500 text-[10px]">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function selectAccount(id) {
            G.activeId = id;
            renderAccounts();
            await loadInfluences();
            await loadActions();
            updateDashboard();
        }

        async function saveAccount() {
            const name = document.getElementById('acc-name').value;
            const valor = document.getElementById('acc-valor').value;
            if(!name) return;

            const { error } = await sb.from('accounts').insert({
                name, valor, user_id: G.user.id
            });
            if(!error) {
                closeAccModal();
                loadAccounts();
            }
        }

        async function deleteAccount(e, id) {
            e.stopPropagation();
            if(!confirm("Excluir território?")) return;
            await sb.from('accounts').delete().eq('id', id);
            if(G.activeId === id) G.activeId = null;
            loadAccounts();
        }

        // ENGINE DE RADAR
        function initRadar() {
            const svg = document.getElementById('radar-svg');
            const center = 250, r = 220, inner = 100;

            VECTORS.forEach((code, i) => {
                const startAng = (i * 30 - 90) * (Math.PI / 180);
                const endAng = ((i + 1) * 30 - 90) * (Math.PI / 180);

                const d = `
                    M ${center + r * Math.cos(startAng)} ${center + r * Math.sin(startAng)}
                    A ${r} ${r} 0 0 1 ${center + r * Math.cos(endAng)} ${center + r * Math.sin(endAng)}
                    L ${center + inner * Math.cos(endAng)} ${center + inner * Math.sin(endAng)}
                    A ${inner} ${inner} 0 0 0 ${center + inner * Math.cos(startAng)} ${center + inner * Math.sin(startAng)}
                    Z
                `;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("id", "vec-" + code);
                path.setAttribute("class", "vector-path fill-white/5 stroke-white/10");
                path.onclick = () => toggleVector(code);
                svg.appendChild(path);

                // Labels
                const midAng = (i * 30 - 75) * (Math.PI / 180);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", center + (r + 20) * Math.cos(midAng));
                text.setAttribute("y", center + (r + 20) * Math.sin(midAng));
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "fill-slate-600 text-[10px] font-black mono");
                text.textContent = code;
                svg.appendChild(text);
            });
        }

        async function loadInfluences() {
            const { data } = await sb.from('influences').select('*').eq('account_id', G.activeId);
            G.influences = data || [];
            updateRadarColors();
        }

        async function toggleVector(code) {
            if(!G.activeId) return;
            const exist = G.influences.find(i => i.influence_code === code);
            let state = 'ativo';
            if(exist?.state === 'ativo') state = 'removido';
            else if(exist?.state === 'removido') state = 'neutro';

            await sb.from('influences').upsert({
                account_id: G.activeId, influence_code: code, state, user_id: G.user.id
            }, { onConflict: 'account_id,influence_code' });

            await loadInfluences();
            updateDashboard();
        }

        function updateRadarColors() {
            VECTORS.forEach(code => {
                const el = document.getElementById('vec-' + code);
                const inf = G.influences.find(i => i.influence_code === code);
                
                if(inf?.state === 'ativo') {
                    el.style.fill = 'rgba(244,63,94,0.4)'; el.style.stroke = '#f43f5e';
                } else if(inf?.state === 'removido') {
                    el.style.fill = 'rgba(16,185,129,0.4)'; el.style.stroke = '#10b981';
                } else {
                    el.style.fill = 'rgba(255,255,255,0.05)'; el.style.stroke = 'rgba(255,255,255,0.1)';
                }
            });
        }

        // ENGINE DE AÇÕES
        async function loadActions() {
            const { data } = await sb.from('actions').select('*').eq('account_id', G.activeId).order('created_at', {ascending: false});
            const list = document.getElementById('action-list');
            list.innerHTML = (data || []).map(a => `
                <div class="glass p-4 rounded-2xl border-l-4 border-emerald-500">
                    <p class="text-[11px] text-slate-200">${a.description}</p>
                    <span class="text-[8px] mono text-slate-600 uppercase mt-2 block">${new Date(a.created_at).toLocaleString()}</span>
                </div>
            `).join('');
        }

        async function addAction() {
            const input = document.getElementById('action-input');
            if(!input.value || !G.activeId) return;
            await sb.from('actions').insert({ account_id: G.activeId, description: input.value, user_id: G.user.id });
            input.value = '';
            loadActions();
        }

        // INTELIGÊNCIA BSM
        function updateDashboard() {
            const ativos = G.influences.filter(i => i.state === 'ativo').length;
            const gravit = Math.round(((12 - ativos) / 12) * 100);
            
            document.getElementById('gravit-val').innerText = gravit + '%';
            
            const txt = document.getElementById('insight-text');
            if(gravit < 40) txt.innerText = "RISCO ESTRUTURAL: Muitos bloqueios ativos. Execute remoção em B1 e B3.";
            else if(gravit > 70) txt.innerText = "FORÇA OTIMIZADA: Território pronto para colapso de venda. Foque em M1.";
            else txt.innerText = "MATURAÇÃO: Continue limpando os vetores sociais (S1-S4).";
        }

        // UI HELPERS
        function openAccModal() { document.getElementById('acc-modal').classList.remove('hidden'); }
        function closeAccModal() { document.getElementById('acc-modal').classList.add('hidden'); }
        async function logout() { await sb.auth.signOut(); location.reload(); }

        // BOOT SEQUENCE (PREVENT BLACK SCREEN)
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { session } } = await sb.auth.getSession();
                initRadar();
                
                if(session) {
                    G.user = session.user;
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('app-view').classList.add('active-app');
                    loadAccounts();
                } else {
                    document.getElementById('auth-view').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Boot Error:", e);
            } finally {
                document.getElementById('boot-loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>
