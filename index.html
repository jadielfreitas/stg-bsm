<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STG-BSM</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bsm: '#0f172a'
          }
        }
      }
    }
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #020617;
    }
  </style>
</head>

<body class="text-white">

<!-- LOGIN -->
<div id="loginScreen" class="flex items-center justify-center h-screen">
  <div class="bg-slate-900 p-8 rounded-xl w-full max-w-md border border-slate-700">
    <h1 class="text-2xl font-bold mb-6 text-center">BSM™ Login</h1>

    <input id="email" type="email" placeholder="E-mail"
      class="w-full mb-4 p-3 rounded bg-slate-800 border border-slate-600"/>

    <input id="password" type="password" placeholder="Senha"
      class="w-full mb-4 p-3 rounded bg-slate-800 border border-slate-600"/>

    <button onclick="login()"
      class="w-full bg-emerald-600 hover:bg-emerald-700 p-3 rounded">
      Entrar
    </button>

    <p id="loginError" class="text-red-500 mt-4 text-center hidden">
      E-mail ou senha inválidos. Tente novamente.
    </p>

    <button onclick="resetPassword()" class="mt-4 text-sm text-gray-400 w-full">
      Esqueci a senha
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 h-16 bg-slate-900 border-b border-slate-700 flex items-center justify-between px-6">
    
    <div>
      <div class="text-xl font-bold tracking-tight">BSM™</div>
      <div class="text-xs text-gray-400">
        Business Structural Market System – Territory · Influence · Execution
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div id="globalGravit" class="text-sm text-emerald-400 font-bold">
        GRAVIT: --
      </div>

      <button class="bg-emerald-600 px-5 py-2 rounded-full hover:bg-emerald-700">
        + Nova Conta
      </button>

      <button onclick="logout()" class="text-gray-400">
        Logout
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex gap-6 p-6 max-w-screen-2xl mx-auto">

    <!-- COLUNA 1 -->
    <div class="w-[35%]">
      <h2 class="font-bold mb-4">Territórios Ativos</h2>
      <div id="accountsList"></div>
    </div>

    <!-- COLUNA 2 -->
    <div class="w-[40%] flex justify-center items-center">
      <div class="text-gray-500">
        Radar BSM será carregado aqui
      </div>
    </div>

    <!-- COLUNA 3 -->
    <div class="w-[25%]">
      <h2 class="font-bold mb-4">Métricas</h2>
      <div id="metrics"></div>
    </div>

  </main>

</div>

<!-- TOAST -->
<div id="toast"
  class="fixed bottom-6 right-6 bg-emerald-600 px-4 py-2 rounded opacity-0 transition">
  Salvo automaticamente
</div>

<script>
/* =========================
   CONFIG SUPABASE
========================= */
const SUPABASE_URL = 'https://jwpncdkrzjlieuaaqyto.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3cG5jZGtyempsaWV1YWFxeXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjUyNTcsImV4cCI6MjA5MDMwMTI1N30.OkyVSFHGL7IHMtE6Y2V7KLFgdkfAyT-YHXBCh_vq9Pw';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   AUTH
========================= */
async function checkSession() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    showDashboard();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("dashboard").classList.add("hidden");
}

function showDashboard() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  loadAccounts();
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    const el = document.getElementById("loginError");
    el.classList.remove("hidden");
    setTimeout(() => el.classList.add("hidden"), 4000);
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  showLogin();
}

async function resetPassword() {
  const email = document.getElementById("email").value;

  if (!email) return;

  await supabaseClient.auth.resetPasswordForEmail(email);

  showToast("Link enviado para o e-mail");
}

/* =========================
   ACCOUNTS (BASE)
========================= */
async function loadAccounts() {
  const { data } = await supabaseClient
    .from('accounts')
    .select('*')
    .order('created_at', { ascending: false });

  const container = document.getElementById("accountsList");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p class='text-gray-500'>Nenhuma conta encontrada</p>";
    return;
  }

  data.forEach(acc => {
    const div = document.createElement("div");
    div.className = "bg-slate-800 p-4 rounded mb-3 border border-slate-700 hover:scale-[1.02] transition";

    div.innerHTML = `
      <div class="font-bold">${acc.name}</div>
      <div class="text-sm text-gray-400">R$ ${acc.valor || 0}</div>
    `;

    container.appendChild(div);
  });
}

/* =========================
   TOAST
========================= */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("opacity-0");

  setTimeout(() => {
    t.classList.add("opacity-0");
  }, 2000);
}

/* =========================
   INIT
========================= */
window.onload = () => {
  checkSession();

  supabaseClient.auth.onAuthStateChange(() => {
    checkSession();
  });
};
</script>

</body>
</html>
