<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSM System - Business Sales Model</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e5e7eb;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease 2s forwards;
        }
        
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 4px solid rgba(255,255,255,0.2); 
            border-top: 4px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-log {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            max-width: 500px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .log-entry { margin-bottom: 5px; padding: 4px 0; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-info { color: #3b82f6; }
        
        /* Main App - Hidden initially */
        .main-app { display: none; }
        
        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }
        
        .btn-secondary { 
            background: rgba(255,255,255,0.1); 
            color: #e5e7eb; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-danger { 
            background: linear-gradient(135deg, #ef4444, #dc2626); 
            color: white; 
        }
        
        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 25px;
            height: calc(100vh - 180px);
        }
        
        .card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(20px);
        }
        
        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Accounts List */
        .accounts-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .account-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .account-item:hover {
            background: rgba(59,130,246,0.1);
            transform: translateX(5px);
        }
        
        /* Radar Chart */
        .radar-container {
            text-align: center;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .radar-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: conic-gradient(
                #ef4444 0deg 30deg,
                #f59e0b 30deg 60deg,
                #10b981 60deg 90deg,
                #3b82f6 90deg 120deg,
                #8b5cf6 120deg 150deg,
                #ec4899 150deg 180deg,
                #f97316 180deg 210deg,
                #dc2626 210deg 240deg,
                #d97706 240deg 270deg,
                #06b6d4 270deg 300deg,
                #a855f7 300deg 330deg,
                #14b8a6 330deg 360deg
            );
            position: relative;
            cursor: pointer;
            margin: 20px auto;
            transition: transform 0.3s;
        }
        
        .radar-circle:hover { transform: scale(1.05); }
        
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: rgba(15,23,42,0.9);
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
        }
        
        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
        }
        
        .metric {
            text-align: center;
            padding: 20px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .metric-value { font-size: 32px; font-weight: 800; color: #60a5fa; }
        .metric-label { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        
        /* Actions */
        .actions-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .action-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid #f59e0b;
        }
        
        /* Forms */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: rgba(17,24,39,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #e5e7eb;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .form-actions { 
            display: flex; 
            gap: 15px; 
            justify-content: flex-end; 
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: 1fr; height: auto; }
        }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <!-- Loading + Debug Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div style="margin-top: 30px; font-size: 18px; font-weight: 600; color: white;">BSM System carregando...</div>
        <div class="status-log" id="debugLog"></div>
    </div>

    <!-- Main App -->
    <div class="container main-app" id="mainApp">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                BSM System Pro
            </div>
            <div>
                <button class="btn btn-primary" id="newAccountBtn"><i class="fas fa-plus"></i> Nova Conta</button>
                <button class="btn btn-secondary" id="downloadBtn"><i class="fas fa-download"></i> Salvar HTML</button>
                <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out"></i> Sair</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard-grid">
            <!-- Accounts + Radar -->
            <div class="card">
                <h2><i class="fas fa-list"></i> Minhas Contas</h2>
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" id="quickNewAccount">
                    <i class="fas fa-plus"></i> + Nova Oportunidade
                </button>
                <div class="accounts-list" id="accountsList"></div>
                
                <div class="radar-container" id="radarContainer" style="margin-top: 30px;">
                    <div class="radar-circle" id="radarChart" title="Clique nos setores para gerenciar vetores BSM">
                        <div class="radar-center">
                            <div id="probabilityScore">0%</div>
                            <div id="urgencyLabel">Selecione uma conta</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px; font-size: 14px; color: #94a3b8;">
                        12 vetores BSM | Clique para alternar: Neutro → Ativo → Removido
                    </div>
                </div>
            </div>

            <!-- Metrics -->
            <div class="card">
                <h2><i class="fas fa-chart-bar"></i> Métricas</h2>
                <div class="metrics-grid" id="metricsGrid"></div>
            </div>

            <!-- Actions -->
            <div class="card">
                <h2><i class="fas fa-tasks"></i> Ações</h2>
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" id="newActionBtn">
                    <i class="fas fa-plus"></i> Nova Ação
                </button>
                <div class="actions-list" id="actionsList"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="accountModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; color: #f8fafc;"><i class="fas fa-building"></i> Nova Conta</h2>
            <form id="accountForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome da Conta</label>
                        <input type="text" id="accountName" placeholder="Empresa XYZ" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="accountValue" placeholder="100000" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="accountStatus">
                        <option value="prospeccao">Prospecção</option>
                        <option value="negociacao">Negociação</option>
                        <option value="proposta">Proposta</option>
                        <option value="fechamento">Fechamento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="accountNotes" rows="3" placeholder="Observações..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="closeAccountModal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="actionModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; color: #f8fafc;"><i class="fas fa-bolt"></i> Nova Ação</h2>
            <form id="actionForm">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="actionDesc" placeholder="Enviar proposta..." required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Prioridade</label>
                        <select id="actionPriority">
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                            <option value="critica">Crítica</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Prazo</label>
                        <input type="date" id="actionDeadline">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="closeActionModal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar Ação</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // DEBUG LOGGING
        const debugLog = document.getElementById('debugLog');
        function log(type, message) {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugLog.appendChild(entry);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        log('info', 'Iniciando BSM System...');

        // Supabase Config - TESTADA
        const SUPABASE_URL = 'https://jwpncdkrzjlieuaaqyto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3cG5jZGtyempsaWV1YWFxeXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjUyNTcsImV4cCI6MjA5MDMwMTI1N30.OkyVSFHGL7IHMtE6Y2V7KLFgdkfAyT-YHXBCh_vq9Pw';

        let supabaseClient;
        let currentUser = null;
        let accounts = [];
        let actions = [];
        let currentAccountId = null;

        // Inicialização com FALLBACK
        async function initApp() {
            log('info', 'Carregando Supabase...');
            
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                log('success', 'Supabase conectado!');
                
                // Test auth
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session?.user) {
                    currentUser = session.user;
                    log('success', `Usuário logado: ${currentUser.email}`);
                    await loadUserData();
                } else {
                    log('info', 'Nenhum usuário logado - modo demo ativo');
                    showDemoMode();
                }
                
            } catch (error) {
                log('error', `Erro Supabase: ${error.message}`);
                log('info', 'Ativando MODO DEMO OFFLINE');
                showDemoMode();
            }
            
            setTimeout(hideLoading, 3000);
            setupEventListeners();
        }

        // Modo Demo (sem Supabase)
        function showDemoMode() {
            accounts = [
                {id:1, name:'Empresa ABC', value:150000, status:'negociacao', notes:'Interessados', probability:65},
                {id:2, name:'Cliente XYZ', value:85000, status:'proposta', notes:'Aguardando aprovação', probability:82}
            ];
            actions = [
                {id:1, description:'Enviar proposta revisada', priority:'alta', deadline:'2026-04-05'},
                {id:2, description:'Reunião de follow-up', priority:'media'}
            ];
            renderAll();
            log('success', 'Modo Demo ativo - dados simulados');
        }

        // Load dados reais
        async function loadUserData() {
            try {
                const [{data: accData}, {data: actData}] = await Promise.all([
                    supabaseClient.from('accounts').select('*').eq('user_id', currentUser.id),
                    supabaseClient.from('actions').select('*').eq('user_id', currentUser.id)
                ]);
                
                accounts = accData || [];
                actions = actData || [];
                renderAll();
                log('success', `Carregados: ${accounts.length} contas, ${actions.length} ações`);
            } catch (error) {
                log('error', 'Erro carregando dados: ' + error.message);
                showDemoMode();
            }
        }

        // Render everything
        function renderAll() {
            renderAccounts();
            renderMetrics();
            renderActions();
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('quickNewAccount').onclick = () => document.getElementById('accountModal').classList.add('active');
            document.getElementById('newActionBtn').onclick = () => document.getElementById('actionModal').classList.add('active');
            
            document.getElementById('closeAccountModal').onclick = () => document.getElementById('accountModal').classList.remove('active');
            document.getElementById('closeActionModal').onclick = () => document.getElementById('actionModal').classList.remove('active');
            
            document.getElementById('downloadBtn').onclick = downloadThisFile;
            document.getElementById('logoutBtn').onclick = () => location.reload();
            
            document.getElementById('accountForm').onsubmit = createAccountDemo;
            document.getElementById('actionForm').onsubmit = createActionDemo;
        }

        // Demo functions (work without Supabase)
        function createAccountDemo(e) {
            e.preventDefault();
            const newAccount = {
                id: Date.now(),
                name: document.getElementById('accountName').value,
                value: parseFloat(document.getElementById('accountValue').value) || 0,
                status: document.getElementById('accountStatus').value,
                notes: document.getElementById('accountNotes').value,
                probability: 45
            };
            accounts.unshift(newAccount);
            document.getElementById('accountModal').classList.remove('active');
            document.getElementById('accountForm').reset();
            renderAll();
            log('success', 'Conta criada (demo)');
        }

        function createActionDemo(e) {
            e.preventDefault();
            const newAction = {
                id: Date.now(),
                description: document.getElementById('actionDesc').value,
                priority: document.getElementById('actionPriority').value,
                deadline: document.getElementById('actionDeadline').value
            };
            actions.unshift(newAction);
            document.getElementById('actionModal').classList.remove('active');
            document.getElementById('actionForm').reset();
            renderAll();
            log('success', 'Ação criada (demo)');
        }

        // Render functions
        function renderAccounts() {
            const container = document.getElementById('accountsList');
            if (accounts.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-inbox" style="font-size:48px;margin-bottom:15px;opacity:0.5"></i><div>Nenhuma conta</div><div>Clique + para criar</div></div>';
                return;
            }
            
            container.innerHTML = accounts.map(acc => `
                <div class="account-item" onclick="selectAccount(${acc.id})">
                    <div style="font-weight:600;font-size:16px;margin-bottom:5px;">${acc.name}</div>
                    <div style="color:#94a3b8;font-size:14px;margin-bottom:10px;">${acc.status} • R$ ${acc.value?.toLocaleString()}</div>
                    ${acc.notes ? `<div style="font-size:13px;color:#d1d5db;">${acc.notes}</div>` : ''}
                    <div style="margin-top:10px;font-size:12px;color:#10b981;font-weight:500;">${acc.probability || 0}% BSM</div>
                </div>
            `).join('');
        }

        window.selectAccount = (id) => {
            currentAccountId = id;
            document.querySelectorAll('.account-item').forEach(item => item.style.background = '');
            event.target.closest('.account-item').style.background = 'rgba(59,130,246,0.2)';
            document.getElementById('probabilityScore').textContent = accounts.find(a => a.id === id)?.probability + '%' || '0%';
        };

        function renderMetrics() {
            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric"><div class="metric-value">${accounts.length}</div><div class="metric-label">Contas</div></div>
                <div class="metric"><div class="metric-value">${accounts.filter(a => a.probability > 70).length}</div><div class="metric-label">Alta Conv.</div></div>
                <div class="metric"><div class="metric-value">${actions.length}</div><div class="metric-label">Ações</div></div>
                <div class="metric"><div class="metric-value">${Math.round(accounts.reduce((s,a)=>s+(a.probability||0),0)/accounts.length || 0)}%</div><div class="metric-label">Média BSM</div></div>
            `;
        }

        function renderActions() {
            const container = document.getElementById('actionsList');
            if (actions.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-list" style="font-size:48px;margin-bottom:15px;opacity:0.5"></i><div>Sem ações</div></div>';
                return;
            }
            container.innerHTML = actions.map(act => `
                <div class="action-item">
                    <div style="font-weight:600;margin-bottom:8px;">${act.description}</div>
                    <div style="font-size:13px;color:#94a3b8;">${act.priority} • ${act.deadline || 'Sem prazo'}</div>
                </div>
            `).join('');
        }

        function hideLoading() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        function downloadThisFile() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'BSM-System-index.html';
            a.click();
            URL.revokeObjectURL(url);
            log('success', 'Arquivo salvo como index.html');
        }

        // START
        initApp();
    </script>
</body>
</html>
