<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSM System - Business Sales Model</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Reset e Base - Dark Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Container Principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header Fixo */
        .header {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 20px;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-color: rgba(79, 70, 229, 0.5);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: rgba(239, 68, 68, 0.5);
            color: white;
        }

        /* Status Indicators */
        .status-indicator {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .status-saving { 
            background: rgba(251, 191, 36, 0.2); 
            color: #fbbf24; 
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .status-saved { 
            background: rgba(34, 197, 94, 0.2); 
            color: #22c55e; 
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* Login Screen - ONLY VISIBLE PRE-LOGIN */
        .login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            max-width: 400px;
            margin: 0 auto;
        }

        .login-card {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
        }

        .login-card h1 {
            margin-bottom: 10px;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            backdrop-filter: blur(10px);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Dashboard - HIDDEN PRE-LOGIN */
        .dashboard-container {
            display: none;
        }

        /* AI Insights */
        .ai-insights {
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .ai-insights::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
        }

        .ai-insights h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .insight-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .insight-item:last-child {
            margin-bottom: 0;
        }

        .insight-text {
            font-weight: 500;
            color: #e2e8f0;
            flex: 1;
        }

        .insight-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-high { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-medium { background: rgba(251, 191, 36, 0.2); color: #facc15; }
        .badge-low { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

        /* Grid Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 250px);
        }

        .section {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            overflow-y: auto;
        }

        .section h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Accounts Section */
        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .account-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .account-card:hover {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.2);
        }

        .account-card.active {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.15);
            box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.5);
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .account-name {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .account-value {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .account-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(79, 70, 229, 0.2);
            color: #a5b4fc;
        }

        /* BSM Radar - CORAÇÃO DO SISTEMA */
        .bsm-radar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 20px;
        }

        .radar-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        .radar-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(
                #1e1e3f 0deg 30deg,
                #2d1b69 30deg 60deg,
                #1e3a8a 60deg 90deg,
                #1e40af 90deg 120deg,
                #3730a3 120deg 150deg,
                #581c87 150deg 180deg,
                #7c3aed 180deg 210deg,
                #a855f7 210deg 240deg,
                #be123c 240deg 270deg,
                #dc2626 270deg 300deg,
                #b91c1c 300deg 330deg,
                #1e1e3f 330deg 360deg
            );
            cursor: pointer;
            transition: all 0.4s ease;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .radar-canvas:hover {
            transform: scale(1.03) rotate(5deg);
        }

        .radar-canvas.clicking {
            animation: clickPulse 0.6s ease;
        }

        @keyframes clickPulse {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #1e1e3f, #2d1b69);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 3px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(20px);
        }

        .probability-score {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            line-height: 1;
        }

        .urgency-indicator {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            letter-spacing: 0.5px;
        }

        /* Metrics Section */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .metric-card:hover::before {
            opacity: 1;
        }

        .metric-card:hover {
            border-color: #4f46e5;
            transform: translateY(-5px);
        }

        .metric-value {
            font-size: 40px;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 10px;
            line-height: 1;
        }

        .metric-label {
            font-size: 15px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Actions Section */
        .actions-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #4f46e5;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .action-item:hover {
            border-left-color: #7c3aed;
            transform: translateX(5px);
        }

        /* Formulários */
        .form-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .form-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .form-card {
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 45px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            backdrop-filter: blur(30px);
        }

        .form-card h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #f8fafc;
            text-align: center;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            backdrop-filter: blur(10px);
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar Dark */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Mobile */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 25px;
                height: auto;
            }
            
            .radar-wrapper {
                width: 280px;
                height: 280px;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SCREEN - VISÍVEL APENAS SEM AUTENTICAÇÃO -->
        <div class="login-screen" id="loginScreen">
            <div class="login-card">
                <h1><i class="fas fa-compass"></i> BSM System</h1>
                <div class="login-subtitle">Business Sales Model • Sistema de Decisão Comercial</div>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="
