<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSM™ Core | Structural Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono&display=swap');
        :root { --emerald: #10b981; --rose: #f43f5e; --slate-950: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--slate-950); color: white; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-bsm { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 1rem; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-bsm:focus { border-color: var(--emerald); }
        #dashboard { display: none; }
        .active-view { display: flex !important; }
        .radar-segment { transition: all 0.3s ease; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[999] flex items-center justify-center bg-[radial-gradient(circle_at_top,_#1e2937_0%,_#020617_100%)]">
        <div class="w-full max-w-md p-6">
            <div class="text-center mb-8">
                <h1 class="text-6xl font-black tracking-tighter">BSM<span class="text-emerald-500">™</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.5em] mt-2">Market Engineering</p>
            </div>

            <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
                <div class="flex gap-2 mb-8 bg-black/40 p-1.5 rounded-2xl">
                    <button type="button" onclick="toggleAuth('login')" id="tab-login" class="flex-1 py-2 text-[10px] font-black rounded-xl bg-white text-black">LOGIN</button>
                    <button type="button" onclick="toggleAuth('signup')" id="tab-signup" class="flex-1 py-2 text-[10px] font-black rounded-xl text-slate-400">REGISTRAR</button>
                </div>

                <form id="auth-form" class="space-y-4">
                    <input type="email" id="email" required class="input-bsm" placeholder="E-mail Corporativo">
                    <input type="password" id="password" required class="input-bsm" placeholder="Senha">
                    
                    <div id="signup-fields" class="hidden space-y-4">
                        <select id="role-select" class="input-bsm">
                            <option value="S">Sales (S1)</option>
                            <option value="M">Manager (M2)</option>
                            <option value="B">Business (B3)</option>
                        </select>
                        <p class="text-[9px] text-slate-500 text-center uppercase font-bold">A senha deve terminar em S1, M2 ou B3</p>
                    </div>

                    <div id="auth-feedback" class="hidden text-[10px] font-black text-center p-3 rounded-xl uppercase border"></div>

                    <button type="submit" id="btn-submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg">
                        ACESSAR TERMINAL
                    </button>

                    <button type="button" onclick="handleReset()" class="w-full text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-4">
                        Esqueceu a senha? Recuperar Chave
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="dashboard" class="h-screen flex-col">
        <nav class="h-20 border-b border-white/5 px-10 flex items-center justify-between glass">
            <div class="flex items-center gap-6">
                <span class="text-2xl font-black tracking-tighter">BSM™</span>
                <span id="badge-nivel" class="px-3 py-1 bg-emerald-500 text-black text-[10px] font-black rounded-md">--</span>
            </div>
            <button onclick="handleLogout()" class="text-slate-500 hover:text-rose-500 font-black text-[10px] uppercase">Sair do Sistema</button>
        </nav>
        
        <main class="flex-1 flex overflow-hidden">
            <aside class="w-80 border-r border-white/5 p-6 flex flex-col bg-black/20">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Territórios</h3>
                    <button onclick="addTerritory()" class="text-emerald-500 font-bold">+</button>
                </div>
                <div id="acc-list" class="space-y-2 overflow-y-auto"></div>
            </aside>

            <section class="flex-1 flex flex-col items-center justify-center p-10 bg-[radial-gradient(circle_at_center,_#111827_0%,_#020617_100%)]">
                <div class="relative">
                    <svg id="radar-svg" width="500" height="500" viewBox="0 0 500 500"></svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="gravit-val" class="text-6xl font-black">0%</span>
                        <span class="text-[10px] text-emerald-500 font-black tracking-widest">GRAVIT™</span>
                    </div>
                </div>
            </section>

            <aside class="w-96 border-l border-white/5 p-8 flex flex-col">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Ações Táticas</h3>
                <div id="action-list" class="flex-1 space-y-4 overflow-y-auto mb-6"></div>
                <div class="relative">
                    <textarea id="action-in" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white" placeholder="Nova ação..."></textarea>
                    <button onclick="submitAction()" class="absolute bottom-4 right-4 bg-emerald-600 p-2 rounded-xl">✓</button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // 1. AUDITORIA DE CONEXÃO: Instanciação Global
        const SUPABASE_URL = 'https://jwpncdkrzjlieuaaqyto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3cG5jZGtyempsaWV1YWFxeXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjUyNTcsImV4cCI6MjA5MDMwMTI1N30.OkyVSFHGL7IHMtE6Y2V7KLFgdkfAyT-YHXBCh_vq9Pw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentAuthMode = 'login';
        let activeAcc = null;
        let activeInfluences = [];

        // 2. RESOLUÇÃO DE LOGIN E REGISTRO
        function toggleAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('tab-login').className = `flex-1 py-2 text-[10px] font-black rounded-xl ${mode === 'login' ? 'bg-white text-black' : 'text-slate-400'}`;
            document.getElementById('tab-signup').className = `flex-1 py-2 text-[10px] font-black rounded-xl ${mode === 'signup' ? 'bg-white text-black' : 'text-slate-400'}`;
            document.getElementById('signup-fields').classList.toggle('hidden', mode === 'login');
            document.getElementById('btn-submit').innerText = mode === 'login' ? 'ACESSAR TERMINAL' : 'FINALIZAR REGISTRO';
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const feedback = document.getElementById('auth-feedback');
            
            // Validação de Sufixo (Regra de Negócio)
            const suffix = password.slice(-2);
            const valid = ['S1', 'M2', 'B3'].includes(suffix);

            if(!valid) {
                showFeedback("Erro: A senha precisa terminar em S1, M2 ou B3.", "rose");
                return;
            }

            if(currentAuthMode === 'signup') {
                const role = document.getElementById('role-select').value;
                if(role !== suffix.charAt(0)) {
                    showFeedback("Erro: Sufixo da senha não condiz com o nível.", "rose");
                    return;
                }

                const { data, error } = await _supabase.auth.signUp({
                    email, password, options: { data: { role: role, suffix: suffix } }
                });

                if(error) showFeedback(error.message, "rose");
                else showFeedback("Sucesso! Verifique seu e-mail para confirmar o acesso.", "emerald");
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if(error) showFeedback("Erro: Credenciais inválidas ou e-mail não confirmado.", "rose");
                else handleEntry(data.user, suffix);
            }
        };

        // 3. RECUPERAÇÃO DE SENHA (FUNCIONALIDADE INTEGRADA)
        async function handleReset() {
            const email = document.getElementById('email').value;
            if(!email) { showFeedback("Digite seu e-mail primeiro.", "rose"); return; }
            
            const { error } = await _supabase.auth.resetPasswordForEmail(email);
            if(error) showFeedback(error.message, "rose");
            else showFeedback("Link de recuperação enviado para " + email, "emerald");
        }

        function showFeedback(txt, color) {
            const f = document.getElementById('auth-feedback');
            f.innerText = txt;
            f.className = `text-[10px] font-black text-center p-3 rounded-xl uppercase border border-${color}-500/30 bg-${color}-500/10 text-${color}-500`;
            f.classList.remove('hidden');
        }

        // 4. INICIALIZAÇÃO DO APP
        async function handleEntry(user, suffix) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.add('active-view');
            document.getElementById('badge-nivel').innerText = suffix;
            loadAccounts();
            drawRadar();
        }

        async function loadAccounts() {
            const { data } = await _supabase.from('accounts').select('*');
            if(data) {
                const list = document.getElementById('acc-list');
                list.innerHTML = data.map(a => `
                    <div onclick="selectAcc('${a.id}')" class="p-4 glass rounded-xl cursor-pointer hover:border-emerald-500 transition-all">
                        <div class="text-[11px] font-black">${a.name}</div>
                        <div class="text-[9px] text-slate-500">R$ ${a.valor}</div>
                    </div>
                `).join('');
            }
        }

        async function selectAcc(id) {
            activeAcc = id;
            const { data } = await _supabase.from('influences').select('*').eq('account_id', id);
            activeInfluences = data || [];
            updateRadarVisuals();
            loadActions();
        }

        // 5. ENGINE DO RADAR (SVG DINÂMICO)
        function drawRadar() {
            const svg = document.getElementById('radar-svg');
            const center = 250, r = 200, inner = 80;
            const codes = ['B1','B2','B3','B4','S1','S2','S3','S4','M1','M2','M3','M4'];

            codes.forEach((code, i) => {
                const start = (i * 30 - 90) * (Math.PI / 180);
                const end = ((i + 1) * 30 - 90) * (Math.PI / 180);
                const d = `M ${center + r * Math.cos(start)} ${center + r * Math.sin(start)} A ${r} ${r} 0 0 1 ${center + r * Math.cos(end)} ${center + r * Math.sin(end)} L ${center + inner * Math.cos(end)} ${center + inner * Math.sin(end)} A ${inner} ${inner} 0 0 0 ${center + inner * Math.cos(start)} ${center + inner * Math.sin(start)} Z`;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("id", "path-" + code);
                path.setAttribute("class", "radar-segment fill-white/5 stroke-white/10");
                path.onclick = () => toggleInfluence(code);
                svg.appendChild(path);
            });
        }

        async function toggleInfluence(code) {
            if(!activeAcc) return;
            const exist = activeInfluences.find(i => i.influence_code === code);
            let state = 'neutro';
            if(!exist || exist.state === 'neutro') state = 'ativo';
            else if(exist.state === 'ativo') state = 'removido';

            await _supabase.from('influences').upsert({
                account_id: activeAcc, influence_code: code, state: state, user_id: (await _supabase.auth.getUser()).data.user.id
            }, { onConflict: 'account_id,influence_code' });

            selectAcc(activeAcc);
        }

        function updateRadarVisuals() {
            const codes = ['B1','B2','B3','B4','S1','S2','S3','S4','M1','M2','M3','M4'];
            let ativos = 0;
            codes.forEach(c => {
                const el = document.getElementById("path-" + c);
                const inf = activeInfluences.find(i => i.influence_code === c);
                if(inf?.state === 'ativo') { el.style.fill = 'rgba(244,63,94,0.4)'; ativos++; }
                else if(inf?.state === 'removido') el.style.fill = 'rgba(16,185,129,0.4)';
                else el.style.fill = 'rgba(255,255,255,0.05)';
            });
            document.getElementById('gravit-val').innerText = Math.round(((12-ativos)/12)*100) + "%";
        }

        async function addTerritory() {
            const n = prompt("Nome do território:");
            const v = prompt("Valor:");
            if(n) {
                const user = (await _supabase.auth.getUser()).data.user;
                await _supabase.from('accounts').insert({ name: n, valor: v, user_id: user.id });
                loadAccounts();
            }
        }

        async function loadActions() {
            const { data } = await _supabase.from('actions').select('*').eq('account_id', activeAcc);
            document.getElementById('action-list').innerHTML = (data || []).map(a => `<div class="p-3 glass rounded-xl text-[10px]">${a.description}</div>`).join('');
        }

        async function submitAction() {
            const val = document.getElementById('action-in').value;
            if(!val || !activeAcc) return;
            await _supabase.from('actions').insert({ account_id: activeAcc, description: val, user_id: (await _supabase.auth.getUser()).data.user.id });
            document.getElementById('action-in').value = '';
            loadActions();
        }

        async function handleLogout() { await _supabase.auth.signOut(); window.location.reload(); }

        // AUTO-LOGIN (PERSISTÊNCIA)
        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if(session) handleEntry(session.user, session.user.user_metadata.suffix || 'S1');
        };
    </script>
</body>
</html>
